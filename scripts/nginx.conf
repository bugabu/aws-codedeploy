# Standard global settings
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    access_log  /var/log/nginx/access.log;

    # Basic performance tuning
    sendfile        on;
    keepalive_timeout  65;

    # THE IP REFLECTOR SERVER BLOCK
    server {
        listen       80;
        # Change 'yourdomain.com' to your actual domain or use '_' for all hosts
        server_name  yourdomain.com _;

        # 1. Returns the WEB SERVER'S IP address
        # Access with: curl http://your-ip/server-ip
        location /server-ip {
            default_type text/plain;
            return 200 "$server_addr\n";
        }

        # 2. Returns the VISITOR'S (CLIENT) IP address
        # Access with: curl http://your-ip/my-ip
        location /my-ip {
            default_type text/plain;
            return 200 "$remote_addr\n";
        }

        # 3. Optional: Add the server IP as a header to ALL requests
        add_header X-Server-Address $server_addr;

        # Standard default location
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}
